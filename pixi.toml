# PRIMARY environment (the lab standard is pixi). requirements.txt is a best-effort
# pip mirror for non-pixi graders; THIS file is the source of truth.
[project]
name = "mmpartnet"
version = "0.1.0"
description = "MultiModal PARNET — protein-conditioned RBP-binding prediction (ML4RG SS26 Project 07)"
channels = ["nvidia", "pytorch", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.12"
numpy = ">=1.24"
pytorch = { version = ">=2.1", channel = "pytorch", build = "*cuda*" }
pytorch-cuda = { version = "12.1.*", channel = "pytorch" }
datasets = ">=4.0"
pyarrow = ">=15"
h5py = ">=3.10"
scikit-learn = ">=1.3"
pytest = ">=7"
ruff = ">=0.4"

[pypi-dependencies]
mmpartnet = { path = ".", editable = true }
pyfaidx = ">=0.7"

[feature.interp.dependencies]
captum = ">=0.7"          # Integrated Gradients (optional)

[feature.esm.pypi-dependencies]
fair-esm = ">=2.0"        # heavy — only for scripts/build_embeddings.py
transformers = ">=4.40"

[environments]
default = { solve-group = "default" }
interp = { features = ["interp"], solve-group = "default" }
esm = { features = ["esm"], solve-group = "default" }

[tasks]
test = "pytest"
lint = "ruff check src"
fetch = "bash scripts/fetch_all.sh"
demos = "bash scripts/run_demos.sh"
